version: "3.8"
# ============================================================
#  TIP Platform - Infrastructure Stack
#
#  STEP 1 (run once before docker-compose up):
#  sudo sysctl -w vm.max_map_count=262144
#
#  STEP 2:
#  docker-compose up -d
#
#  Stop: docker-compose down
#  Stop + delete all data: docker-compose down -v
# ============================================================

services:

  # ── MongoDB ───────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: tip_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_DATABASE: threat_intel
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/threat_intel --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Elasticsearch ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: tip_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - bootstrap.memory_lock=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s

  # ── Kibana ────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: tip_kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=a7a6311933d3503b89bc2dbc36572c33a6c10925682e591bffcab6911c06786d
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 60s

volumes:
  mongodb_data:
    driver: local
  es_data:
    driver: local

networks:
  default:
    name: tip_network
